version : "3"
services:
  unopim-web:
    build:
      context: .
      dockerfile: dockerfiles/web.Dockerfile
    container_name: unopim-web
    volumes:
      - .:/var/www/html
    networks:
        - diesite
    ports:
      - "8000:80"
    restart: "no"
    # Zelfde queue-opstelling als productie (Redis + Horizon); process-env
    # gaat vóór .env, dus dit dwingt de juiste driver af.
    environment:
      QUEUE_DRIVER: redis
      REDIS_HOST: unopim-redis
    depends_on:
      - unopim-mysql
      - unopim-redis

  unopim-mysql:
    image: mysql:8
    container_name: unopim-mysql
    volumes:
      - unopim-mysql-disk:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
        - diesite
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: unopim

  unopim-q:
    build:
      context: .
      dockerfile: dockerfiles/q.Dockerfile
    container_name: unopim-q
    volumes:
      - .:/var/www/html
    restart: no
    networks:
        - diesite
    environment:
      QUEUE_DRIVER: redis
      REDIS_HOST: unopim-redis
    depends_on:
      - unopim-mysql
      - unopim-redis

  unopim-redis:
    image: redis:7-alpine
    container_name: unopim-redis
    networks:
        - diesite
    restart: "no"

#  unopim-mailpit:
#    image: 'axllent/mailpit:latest'
#    container_name: unopim-mailpit
#    networks:
#        - diesite
#    restart: "no"
#    ports:
#      - "8025:8025"

networks:
    diesite:
        name: diesite
        external: true
        driver: bridge

# On-disk storage of DB data, when containers are stopped
volumes:
  unopim-mysql-disk:
    driver: local
